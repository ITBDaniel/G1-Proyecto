<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar perfil</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/navbar.js" type="module" defer></script>
  <script src="../js/navbarActive.js" type="module" defer></script>
  <script src="../js/editarPerfil.js" type="module" defer></script>


</head>
<body>
  <main>
    <h2 id="authTitle">Editar información</h2>

    <form action="" method="post" id="perfilForm">
      <label for="nom">Nombre</label>
      <input type="text" id="nom" required />

      <label for="email">Correo</label>
      <input type="email" id="email" required />

      <label for="contrasenya">Nueva contraseña (opcional)</label>
      <input type="password" id="contrasenya" minlength="6" />

      <label for="contrasenyaConfirm">Confirmar contraseña</label>
      <input type="password" id="contrasenyaConfirm" minlength="6" />

      <button type="submit" id="guardarBtn">Guardar cambios</button>
    </form>

    <section id="perfilError"></section>
  </main>
</body>
</html>
